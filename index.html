<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome to Flip-a-Thing</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f6fb;
      color: #172033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #d9dee8;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(16, 32, 73, 0.08);
      padding: 36px 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 28px;
      color: #4f5f7a;
      max-width: 44rem;
      line-height: 1.65;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #102a5e;
      padding: 14px 18px;
      border: 1px solid #d1d9e4;
      border-radius: 12px;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    a:hover,
    a:focus-visible {
      background: #f5f7fb;
      border-color: #b8c4db;
      transform: translateY(-1px);
      outline: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.4rem;
      height: 2.4rem;
      border-radius: 999px;
      background: #eef4ff;
      color: #1d4ed8;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Welcome to Flip-a-Thing</h1>
    <p>Flip-a-Thing is a portable PDF flipbook viewer package. Use this landing page to open the marketing demo, developer guide, or bundled sample PDFs.</p>
    <ul>
      <li><a href="marketing/index.html"><span class="badge">1</span> Marketing demo</a></li>
      <li><a href="marketing/dev-index.html"><span class="badge">2</span> Implementation guide</a></li>
      <li><a href="example-pdfs/"><span class="badge">3</span> View sample PDFs</a></li>
    </ul>
  </article>
</body>
</html>
